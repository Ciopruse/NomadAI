<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NomadAI • Travel Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="Travel/assets/css/style.css">
</head>
<body class="bg-slate-950 text-white">
  <header class="bg-slate-900 border-b border-slate-700 sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-cyan-400">NomadAI</h1>
      <nav class="flex gap-6 text-lg">
        <a href="#" class="hover:text-cyan-400">Home</a>
        <a href="Travel/plan.html" class="hover:text-cyan-400">Plan Trip</a>
        <a href="Travel/chat.html" class="hover:text-cyan-400">AI Agent</a>
        <a href="Travel/bookings.html" class="hover:text-cyan-400">My Bookings</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-6 space-y-10">
    <section class="rounded-3xl overflow-hidden relative h-[420px] hero-banner">
      <div class="absolute inset-0 flex items-center justify-center p-6">
        <div class="text-center">
          <h2 class="text-5xl md:text-6xl font-bold mb-4">Your Dream Trip<br>Powered by <span class="text-cyan-400">AI</span></h2>
          <p class="text-xl md:text-2xl text-slate-200 mb-6">Smart planning, instant quotes, and personalized itineraries.</p>
          <div class="flex flex-col sm:flex-row justify-center gap-4">
            <a href="chat.html" class="bg-cyan-400 hover:bg-cyan-300 text-black font-bold px-8 py-4 rounded-3xl">Talk to AI Agent</a>
            <a href="plan.html" class="border border-cyan-400 text-cyan-400 hover:bg-cyan-500/20 px-8 py-4 rounded-3xl">Create Trip Plan</a>
          </div>
        </div>
      </div>
    </section>

   <section class="max-w-7xl mx-auto px-6 py-20">
  <h2 class="text-4xl font-bold text-center mb-4">Popular Destinations</h2>
  <p class="text-center text-slate-400 mb-12">Click on any destination and let our AI plan your perfect trip</p>
  
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8" id="destinations"></div>
</section>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
