<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings • NomadAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-950 text-white">
  <!-- Navbar (same as other pages) -->
  <nav class="bg-slate-900 border-b border-slate-700 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-cyan-400">NomadAI</h1>
      <div class="flex gap-8 text-lg">
        <a href="index.html" class="hover:text-cyan-400">Home</a>
        <a href="plan.html" class="hover:text-cyan-400">Plan Trip</a>
        <a href="chat.html" class="hover:text-cyan-400">AI Agent</a>
        <a href="bookings.html" class="hover:text-cyan-400">My Bookings</a>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-6 py-12">
    <h1 class="text-5xl font-bold mb-8">My Bookings</h1>
    <div id="bookingsList" class="space-y-6"></div>
  </div>

  <script>
    async function loadBookings() {
      const container = document.getElementById('bookingsList');
      container.innerHTML = '<p class="text-slate-400">Loading your bookings...</p>';

      try {
        const res = await fetch('http://localhost:5000/api/bookings');
        if (!res.ok) throw new Error('Failed to load bookings');
        const bookings = await res.json();

        if (bookings.length === 0) {
          container.innerHTML = `<p class="text-slate-400">No bookings yet. Book your first trip via AI Agent!</p>`;
          return;
        }

        container.innerHTML = bookings.map(b => `
          <div class="bg-slate-900 rounded-3xl p-8 flex justify-between items-center">
            <div>
              <h3 class="text-2xl font-semibold">${b.destination || 'Trip'}</h3>
              <p class="text-cyan-400">${new Date(b.date).toLocaleDateString('en-IN')}</p>
              <p class="text-sm text-slate-400">${b.type} • ₹${b.price}</p>
            </div>
            <div class="text-right">
              <span class="inline-block px-5 py-2 bg-green-500 text-black rounded-2xl text-sm font-bold">${b.status}</span>
            </div>
          </div>
        `).join('');
      } catch (err) {
        container.innerHTML = `<p class="text-red-400">❌ ${err.message}</p>`;
      }
    }

    // Load bookings when page opens
    window.onload = loadBookings;
  </script>
</body>
</html>
